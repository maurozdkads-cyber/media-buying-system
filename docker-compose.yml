services:
  postgres:
    image: postgres:16-alpine
    container_name: media-buying-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: media_buying
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
